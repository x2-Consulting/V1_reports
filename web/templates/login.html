<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Trend Vision One Reporter</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body class="tv1-login-wrapper">

  <div class="card shadow-lg border-0 tv1-login-card">
    <!-- Red header band -->
    <div class="tv1-login-header text-white text-center py-4 px-4 rounded-top">
      <i class="bi bi-shield-fill-check fs-1 mb-2 d-block"></i>
      <h4 class="fw-bold mb-0">Trend Vision One</h4>
      <p class="mb-0 small opacity-75">Security Reporter Portal</p>
    </div>

    <div class="card-body p-4">
      {% if error %}
      <div class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      {% endif %}

      <form action="/login" method="post" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />

        <div class="mb-3">
          <label for="username" class="form-label fw-semibold">
            <i class="bi bi-person me-1"></i>Username
          </label>
          <input
            type="text"
            class="form-control"
            id="username"
            name="username"
            placeholder="Enter your username"
            required
            autofocus
            autocomplete="username"
          />
        </div>

        <div class="mb-4">
          <label for="password" class="form-label fw-semibold">
            <i class="bi bi-lock me-1"></i>Password
          </label>
          <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="btn btn-tv1 w-100 fw-semibold py-2">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>
    </div>

    <div class="card-footer text-center text-muted small py-3 bg-transparent">
      Confidential &mdash; Authorised access only
    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFXMukHXYf8FoKC7lS83aYxL48M"
    crossorigin="anonymous"
  ></script>
</body>
</html>
