<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Security Portal — Sign In</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <style>
    body {
      min-height: 100vh;
      background: #0d1b2a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .portal-login-card {
      width: 100%;
      max-width: 420px;
      background: #1a2b42;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      overflow: hidden;
    }
    .portal-login-header {
      background: #0f1f3d;
      padding: 2rem 2rem 1.5rem;
      text-align: center;
    }
    .portal-login-header i {
      color: #4d9fff;
      font-size: 3rem;
      display: block;
      margin-bottom: 0.75rem;
    }
    .portal-login-header h4 {
      color: #ffffff;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .portal-login-header p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.875rem;
      margin: 0;
    }
    .portal-login-body {
      padding: 2rem;
    }
    .form-control {
      background: #0d1b2a;
      border-color: rgba(255, 255, 255, 0.15);
      color: #e0e6f0;
    }
    .form-control:focus {
      background: #0d1b2a;
      border-color: #4d9fff;
      color: #e0e6f0;
      box-shadow: 0 0 0 0.2rem rgba(77, 159, 255, 0.25);
    }
    .form-control::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }
    .form-label {
      color: rgba(255, 255, 255, 0.8);
      font-weight: 600;
      font-size: 0.875rem;
    }
    .btn-portal {
      background: #1a6fc4;
      border-color: #1a6fc4;
      color: #ffffff;
      font-weight: 600;
      padding: 0.6rem 1rem;
    }
    .btn-portal:hover {
      background: #145ea8;
      border-color: #145ea8;
      color: #ffffff;
    }
    .portal-footer {
      text-align: center;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.8rem;
      padding: 1rem 2rem 1.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }
  </style>
</head>
<body>

  <div class="portal-login-card shadow-lg">
    <div class="portal-login-header">
      <i class="bi bi-shield-fill-check"></i>
      <h4>Customer Security Portal</h4>
      <p>Sign in to view your security dashboard</p>
    </div>

    <div class="portal-login-body">
      {% if error %}
      <div class="alert alert-danger alert-dismissible fade show py-2" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
      </div>
      {% endif %}

      <form action="/portal/login" method="post" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />

        <div class="mb-3">
          <label for="username" class="form-label">
            <i class="bi bi-person me-1"></i>Username
          </label>
          <input
            type="text"
            class="form-control"
            id="username"
            name="username"
            placeholder="Enter your username"
            required
            autofocus
            autocomplete="username"
          />
        </div>

        <div class="mb-4">
          <label for="password" class="form-label">
            <i class="bi bi-lock me-1"></i>Password
          </label>
          <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="btn btn-portal w-100">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>
    </div>

    <div class="portal-footer">
      Confidential &mdash; Authorised access only
    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFXMukHXYf8FoKC7lS83aYxL48M"
    crossorigin="anonymous"
  ></script>
</body>
</html>
